name: Selenium Test Suite

on:
  push:
    branches:
      - main  # Runs the workflow on pushes to the main branch
  pull_request:
    branches:
      - main  # Runs the workflow on pull requests to the main branch

jobs:
  selenium:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code (selenium repo)
        uses: actions/checkout@v5
        with:
          repository: Area-Turtle/selenium-automation-project  # Specify your selenium repository, if it's different from the main one
          path: selenium-automation-project
          ref: main  # Optionally specify the branch for selenium tests
      
      - name: Checkout code (server repo)
        uses: actions/checkout@v5
        with:
          repository: Area-Turtle/the-internet.herokuapp.com.server  # Specify your server repository
          path: 
            the-internet.herokuapp.com.server
          ref: master

      - name: setup Ruby
        uses: ruby/setup-ruby@v1
        with: 
          ruby-version: '3.3'
          bundler-cache: true

      - name: install ruby dependencies
        run: gem install bundler

      - name: Start The Internet Server
        run: |
          bundle exec rackup -p 3000 > server.log 2>&1 &
          echo $! > server.pid

      - name: Health Check
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting for server..."
            sleep 2
          done
          echo "Server failed to start"
          cat server.log
          exit 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Selenium Tests
        run: mvn clean test
        env:
          BASE_URL: http://localhost:3000


