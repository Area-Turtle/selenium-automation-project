name: Selenium Test Suite

on:
  push:
    branches:
      - main  # Runs the workflow on pushes to the main branch
  pull_request:
    branches:
      - main  # Runs the workflow on pull requests to the main branch

jobs:
  selenium:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code (server repo)
        uses: actions/checkout@v5
        with:
          repository: Area-Turtle/the-internet.herokuapp.com.server  # Specify your server repository
          ref: master
          path: server

      - name: setup Ruby
        uses: ruby/setup-ruby@v1
        with: 
          ruby-version: '2.7.2'
          bundler-cache: true
          working-directory: server

      - name: install ruby dependencies
        working-directory: server
        run: bundle install

      - name: Start The Internet Server
        working-directory: server
        run: |
          bundle exec rackup -p 9292 > server.log 2>&1 &
          echo $! > server.pid

      - name: Health Check
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:9292; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting for server..."
            sleep 2
          done
          echo "Server failed to start"
          cat server.log
          exit 1

      # - name: Show server log
      #   working-directory: server
      #   if: always()
      #   run: cat server.log

      # - name: Show homepage title
      #   run: |
      #     curl -s http://localhost:9292 | head -50

      - name: Checkout code (selenium repo)
        uses: actions/checkout@v5
        with:
          repository: Area-Turtle/selenium-automation-project  # Specify your selenium repository, if it's different from the main one
          # path: selenium-automation-project
          ref: main  # Optionally specify the branch for selenium tests
          path: seleneium
      
      - name: Set up Node.js for selenium
        uses: actions/setup-node@v4
        with:
          node-version: 24  # Specify the Node.js version (use the version your project uses)
      
      - name: Debug folders
        run: |
          pwd
          ls -R
      - name: Install dependencies (selenium)
        run: npm install  # Installs the dependencies from package.json
        working-directory: seleneium
        env:
          MANPATH: /nonexistent

      - name: install chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run selenium test
        working-directory: seleneium
        run: node seleneium_mainTest.js
        env:
          BASE_URL: http://localhost:9292

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report
          path: reports

    